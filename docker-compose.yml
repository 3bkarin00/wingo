services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wingstructgen
      POSTGRES_PASSWORD: wingstructgen
      POSTGRES_DB: wingstructgen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wingstructgen"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

# api/worker/report/frontend services are added in the phase that builds
# their first real image (see docs/decisions — P0 scope note in changelog.md).

volumes:
  pgdata:
