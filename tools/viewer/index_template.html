<title>WingStructGen — Backend Capability Viewer</title>
<style>
  /* Deliberately single-theme: a CAD viewport (Fusion/Blender/SolidWorks-style)
     is conventionally dark regardless of OS theme — this mirrors that
     vernacular rather than half-heartedly reskinning a diagnostic tool. */
  :root {
    --bg-viewport: #0a0d12;
    --bg-panel: #11151d;
    --border: #232a38;
    --text: #dde3ee;
    --text-dim: #7c8698;
    --structure: #4fb2e8;
    --kinematic: #f5a742;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", ui-sans-serif, system-ui, sans-serif;
    color: var(--text);
    background: var(--bg-viewport);
  }

  #app { display: flex; height: 100vh; width: 100vw; }

  .sidebar {
    width: 272px;
    flex: none;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    overflow-y: auto;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--structure);
    font-weight: 600;
  }

  h1 {
    font-size: 17px;
    margin: 4px 0 2px;
    font-weight: 600;
    text-wrap: balance;
  }

  .subtitle {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .capabilities {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 12px;
    background: rgba(79, 178, 232, 0.06);
    border: 1px solid rgba(79, 178, 232, 0.18);
    border-radius: 6px;
  }
  .capabilities div {
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .capabilities div b { color: var(--text); font-weight: 600; }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .layer-list { display: flex; flex-direction: column; gap: 2px; }
  .layer-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 6px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
  }
  .layer-row:hover { background: rgba(255, 255, 255, 0.04); }
  .layer-row input { accent-color: var(--structure); }
  .swatch {
    width: 9px; height: 9px; border-radius: 2px; flex: none;
  }
  .layer-name { color: var(--text); }

  .stats { margin-top: auto; display: flex; flex-direction: column; gap: 3px; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
  }
  .stat-key { color: var(--text-dim); }
  .stat-val { color: var(--text); }

  .note {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .viewport { flex: 1; position: relative; }
  #gl { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
  #gl:active { cursor: grabbing; }

  .hint {
    position: absolute;
    top: 16px;
    left: 16px;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(17, 21, 29, 0.7);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 5px;
    backdrop-filter: blur(4px);
    pointer-events: none;
  }
</style>

<div id="app">
  <div class="sidebar">
    <div>
      <div class="eyebrow">Diagnostic Viewer — Not Product UI</div>
      <h1>WingStructGen</h1>
      <div class="subtitle" id="config-name">—</div>
    </div>

    <div class="capabilities" id="capabilities"></div>

    <div>
      <div class="section-label">Layers</div>
      <div class="layer-list" id="layer-list"></div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="note">
      Reference geometry (spars, ribs, hinge axes) is built for the half-span
      the backend currently produces; the OML solid shown is the full
      mirrored span. Real product viewer lands in P10.
    </div>
  </div>

  <div class="viewport">
    <canvas id="gl"></canvas>
    <div class="hint">drag to orbit · scroll to zoom</div>
  </div>
</div>

<script><!-- __THREE_JS__ --></script>
<script>window.VIEWER_DATA = /* __VIEWER_DATA__ */ {};</script>
