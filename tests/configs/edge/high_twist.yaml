# Edge: large washout (-15 deg tip twist) — stresses twist about the axis + loft.
planform:
  span_mm: 2000
  segments: [{name: whole, y_end_frac: 1.0, dihedral_deg: 0.0, sweep_le_deg: 0.0}]
  stations:
    - {y_frac: 0.0, chord_mm: 300, twist_deg:  0.0, airfoil: naca2412}
    - {y_frac: 1.0, chord_mm: 200, twist_deg: -15.0, airfoil: naca2412}
  twist_axis_xc: 0.25
  mirror: true
airfoils: {sources: [naca4], resample_points: 199, te_min_thickness_mm: 0.8}
skin:
  face_sheet: {material: cfrp_200gsm_twill, plies: 1}
  core: {material: rohacell_31, thickness_mm: 2.0}
  ramp_ratio: 3.0
spars:
  - {name: main, xc_root: 0.25, xc_tip: 0.25, web: {material: cfrp_200gsm_twill, plies: 2},
     tongue: {cross_section: rect_hollow, engagement_mm: 100, clearance_mm: 0.2, wall_mm: 2.0}}
ribs: {count: 5, construction: {material: cfrp_200gsm_twill, plies: 2}, lightening_holes: {enabled: true, margin_mm: 8}}
output: {formats: [step, stl, gltf]}
