# P4 device config — HALF-WING (mirror:false) with a single TE control surface,
# so the cut yields exactly 2 bodies (wing + control surface). Full-span
# device mirroring is deferred (see docs/r0_findings/p04.md).
# Chords sized so the 5 mm control-surface gap fits with a healthy nose at the
# 0.75-chord hinge (a 5 mm clearance needs ~10 mm local half-thickness).
planform:
  span_mm: 1200
  segments: [{name: whole, y_end_frac: 1.0, dihedral_deg: 0.0, sweep_le_deg: 0.0}]
  stations:
    - {y_frac: 0.0, chord_mm: 420, twist_deg: 0.0, airfoil: naca2412}
    - {y_frac: 1.0, chord_mm: 300, twist_deg: 0.0, airfoil: naca2412}
  twist_axis_xc: 0.25
  mirror: false
airfoils: {sources: [naca4], resample_points: 199, te_min_thickness_mm: 0.8}
skin:
  face_sheet: {material: cfrp_200gsm_twill, plies: 2}
  core: {material: rohacell_31, thickness_mm: 3.0}
  ramp_ratio: 3.0
spars:
  - {name: main, xc_root: 0.25, xc_tip: 0.25, web: {material: cfrp_200gsm_twill, plies: 4},
     tongue: {cross_section: rect_hollow, engagement_mm: 120, clearance_mm: 0.2, wall_mm: 2.0}}
  - {name: rear, xc_root: 0.70, xc_tip: 0.70, web: {material: cfrp_200gsm_twill, plies: 3},
     tongue: {cross_section: rect_hollow, engagement_mm: 120, clearance_mm: 0.2, wall_mm: 2.0}}
ribs: {count: 7, construction: {material: cfrp_200gsm_twill, plies: 3}, lightening_holes: {enabled: true, margin_mm: 8}}
te_surface: {enabled: true, span_start_frac: 0.55, span_end_frac: 0.95,
             hinge_xc_start: 0.75, hinge_xc_end: 0.75, gap_mm: 5.0,
             max_deflection_deg: 25, hinges: {mode: generated, count: 3}}
output: {formats: [step, stl, gltf]}
