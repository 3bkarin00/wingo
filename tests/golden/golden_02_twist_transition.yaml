# Golden 02 — twist + airfoil transition (NACA 5-digit root -> UIUC tip),
# single segment. Exercises twist about the declared axis and shape morphing.
planform:
  span_mm: 2400
  segments:
    - {name: whole, y_end_frac: 1.0, dihedral_deg: 0.0, sweep_le_deg: 0.0}
  stations:
    - {y_frac: 0.0, chord_mm: 320, twist_deg: 0.0, airfoil: naca23012}
    - {y_frac: 1.0, chord_mm: 180, twist_deg: -3.0, airfoil: "uiuc:sd7037"}
  twist_axis_xc: 0.25
  mirror: true
airfoils: {sources: [naca5, uiuc], resample_points: 199, te_min_thickness_mm: 0.8}
skin:
  face_sheet: {material: cfrp_200gsm_twill, plies: 1}
  core: {material: rohacell_31, thickness_mm: 2.0}
  ramp_ratio: 3.0
spars:
  - {name: main, xc_root: 0.25, xc_tip: 0.25, web: {material: cfrp_200gsm_twill, plies: 3},
     tongue: {cross_section: rect_hollow, engagement_mm: 120, clearance_mm: 0.2, wall_mm: 2.0}}
ribs: {count: 7, construction: {material: cfrp_200gsm_twill, plies: 3}, lightening_holes: {enabled: true, margin_mm: 8}}
output: {formats: [step, stl, gltf]}
